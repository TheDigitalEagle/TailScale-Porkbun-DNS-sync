services:
  tailscale-porkbun-dns-sync:
    build:
      context: .
    container_name: tailscale-porkbun-dns-sync
    environment:
      PORKBUN_API_KEY: ${PORKBUN_API_KEY}
      PORKBUN_SECRET_API_KEY: ${PORKBUN_SECRET_API_KEY}
      PORKBUN_DOMAIN: ${PORKBUN_DOMAIN:-ima.fish}
      PORKBUN_SUBDOMAIN_SUFFIX: ${PORKBUN_SUBDOMAIN_SUFFIX:-int}
      PORKBUN_TTL: ${PORKBUN_TTL:-600}
      PUBLIC_IP_ENABLED: ${PUBLIC_IP_ENABLED:-false}
      PUBLIC_IP_LOOKUP_URL: ${PUBLIC_IP_LOOKUP_URL:-https://api.ipify.org}
      PUBLIC_IPV6_ENABLED: ${PUBLIC_IPV6_ENABLED:-false}
      PUBLIC_IPV6_LOOKUP_URL: ${PUBLIC_IPV6_LOOKUP_URL:-https://api6.ipify.org}
      PUBLIC_IPV6_RECORD_NAMES: ${PUBLIC_IPV6_RECORD_NAMES:-}
      PUBLIC_IPV6_ADDRESS: ${PUBLIC_IPV6_ADDRESS:-}
      DRY_RUN: ${DRY_RUN:-false}
      API_ENABLED: ${API_ENABLED:-false}
      API_LISTEN_ADDR: ${API_LISTEN_ADDR:-:8080}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-3600}
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-tailscale-porkbun-dns-sync}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SOCKET: /var/run/tailscale/tailscaled.sock
      TS_TUN_MODE: ${TS_TUN_MODE:-userspace-networking}
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8081}:8080"
    volumes:
      - tailscale-state:/var/lib/tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
